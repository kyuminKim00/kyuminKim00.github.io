<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo | Kyumin Kim Portfolio</title>
    <meta name="description" content="AI, Computer Vision, Data Science 연구 및 프로젝트 포트폴리오 - Photo" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
</head>

<body>
    <header class="site-header">
        <div class="site-header-inner container">
            <a href="index.html" class="logo">
                <span class="logo-mark"></span>
                <span class="logo-text">Portfolio</span>
            </a>
            <nav class="nav">
                <button class="nav-toggle" aria-label="메뉴 열기">
                    <span></span><span></span>
                </button>
                <ul class="nav-list">
                    <li>
                        <a href="index.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="nav-icon">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            About
                        </a>
                    </li>
                    <li>
                        <a href="work.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="nav-icon">
                                <rect width="20" height="14" x="2" y="7" rx="2" ry="2" />
                                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 0 0 0-2 2v16" />
                            </svg>
                            Work
                        </a>
                    </li>
                    <li>
                        <a href="photo.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="nav-icon">
                                <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                                <circle cx="9" cy="9" r="2" />
                                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                            </svg>
                            Photo
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Photos -->
        <section id="photos" class="section">
            <div class="container section-header">
                <div class="section-header-left">
                    <h2>Photo</h2>
                    <p>
                        Click the thumbnail to view the high-resolution image.
                    </p>
                </div>
            </div>
            <div class="container">
                <div id="photo-grid" class="photo-grid">
                    <!-- main.js에서 data/photos.json을 불러와 갤러리를 렌더링합니다. -->
                </div>
            </div>
        </section>
    </main>

    <!-- Photo Modal -->
    <div id="photo-modal" class="photo-modal" aria-hidden="true">
        <div class="photo-modal-backdrop" data-close-modal></div>
        <div class="photo-modal-dialog" role="dialog" aria-modal="true">
            <button class="photo-modal-close" type="button" aria-label="닫기" data-close-modal>
                ✕
            </button>
            <button class="photo-modal-nav prev" aria-label="이전 사진">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </button>
            <button class="photo-modal-nav next" aria-label="다음 사진">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </button>
            <div class="photo-modal-image-wrapper">
                <img id="photo-modal-image" src="" alt="" />
            </div>
            <div class="photo-modal-info">
                <p id="photo-modal-meta"></p>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container footer-inner">
            <span>© <span id="footer-year"></span> Kyumin Kim</span>
            <span class="footer-note">Built for GitHub Pages · Cloudinary Photo Gallery</span>
        </div>
    </footer>

    <script src="main.js"></script>
</body>

</html>
